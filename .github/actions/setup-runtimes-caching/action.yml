name: "Setup Runtimes, Caching"
description: "Configures .NET SDKs and manages NuGet dependency caching"
inputs:
  name:
    description: "Environment identifier (e.g., Build, Test, Release)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup .NET SDKs
      uses: actions/setup-dotnet@v4
      with:
        # Installing multiple SDKs to support multi-targeting (net8.0, net9.0, net10.0)
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
        # Using built-in caching for improved reliability across OS matrix
        cache: true
        # Track all project and configuration files to trigger cache invalidation
        cache-dependency-path: |
          **/Directory.Packages.props
          **/Directory.Build.props
          **/*.csproj
          **/global.json
